name: ci
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: predigy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The OMS integration tests connect via this env var (see
      # bin/predigy-engine/tests/oms_integration.rs::test_database_url).
      # Local dev defaults to peer-auth on the UNIX socket
      # (postgresql:///predigy_test); CI uses TCP to the services
      # block above.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/predigy_test
    steps:
      - uses: actions/checkout@v4
      - run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Apply migrations to predigy_test
        run: |
          for migration in migrations/*.sql; do
            echo "applying $migration"
            PGPASSWORD=postgres psql -h localhost -U postgres -d predigy_test \
              -v ON_ERROR_STOP=1 -f "$migration"
          done
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked
